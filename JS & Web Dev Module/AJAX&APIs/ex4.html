<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GIPHY Cat Gif</title>
</head>
<body>
  <h1>Cat Gif</h1>
  <iframe id="gif-display" width="480" height="270" frameborder="0"></iframe>

  <script>
    // Replace with YOUR GIPHY API key (get one free at https://developers.giphy.com)
    const API_KEY = "YOUR_GIPHY_API_KEY";

    fetch(`https://api.giphy.com/v1/gifs/search?q=cats&api_key=${API_KEY}&limit=1`)
      .then(response => response.json())
      .then(data => {
        const embedUrl = data.data[0].embed_url;
        document.getElementById("gif-display").src = embedUrl;
      })
      .catch(error => {
        console.error("Error fetching gif:", error);
      });
  </script>
</body>
</html>
