<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GIF Generator</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { padding: 8px; font-size: 16px; width: 200px; }
    button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
    #gif-display { display: block; margin-top: 20px; width: 480px; height: 270px; border: none; }
  </style>
</head>
<body>
  <h1>GIF Generator</h1>

  <input type="text" id="search-input" placeholder="Search for a gif..." />
  <button id="search-btn">Search</button>

  <iframe id="gif-display"></iframe>

  <script>
    // Replace with YOUR GIPHY API key (get one free at https://developers.giphy.com)
    const API_KEY = "YOUR_GIPHY_API_KEY";

    document.getElementById("search-btn").addEventListener("click", function () {
      const query = document.getElementById("search-input").value;

      if (!query) {
        alert("Please enter a search term!");
        return;
      }

      fetch(`https://api.giphy.com/v1/gifs/search?q=${encodeURIComponent(query)}&api_key=${API_KEY}&limit=1`)
        .then(response => response.json())
        .then(data => {
          if (data.data.length === 0) {
            alert("No gifs found for that search term.");
            return;
          }
          const embedUrl = data.data[0].embed_url;
          document.getElementById("gif-display").src = embedUrl;
        })
        .catch(error => {
          console.error("Error fetching gif:", error);
        });
    });
  </script>
</body>
</html>
