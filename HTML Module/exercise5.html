<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
</head>
<body>

  <h1>Contact Us</h1>
  <p>We would love to hear from you! Please fill out the form below and we will get back to you as soon as possible.</p>

  <form action="#" method="post">

    <fieldset>
      <legend>Personal Information</legend>

      <label for="first-name">First Name:</label><br>
      <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" required><br><br>

      <label for="last-name">Last Name:</label><br>
      <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" required><br><br>

      <label for="email">Email Address:</label><br>
      <input type="email" id="email" name="email" placeholder="you@gmail.com" required><br><br>

      <label for="phone">Phone Number:</label><br>
      <input type="tel" id="phone" name="phone" placeholder="+972-000-000-0000"><br><br>

      <label for="dob">Date of Birth:</label><br>
      <input type="date" id="dob" name="dob"><br><br>
    </fieldset>

    <br>

    <fieldset>
      <legend>Your Inquiry</legend>

      <label for="subject">Subject:</label><br>
      <select id="subject" name="subject" required>
        <option value="">-- Select a subject --</option>
        <option value="general">General Inquiry</option>
        <option value="support">Technical Support</option>
        <option value="billing">Billing Question</option>
        <option value="feedback">Feedback</option>
        <option value="other">Other</option>
      </select><br><br>

      <label for="message">Message:</label><br>
      <textarea id="message" name="message" rows="6" cols="50" placeholder="Write your message here..." required></textarea><br><br>
    </fieldset>

    <br>

    <fieldset>
      <legend>Preferences</legend>

      <p>Preferred contact method:</p>
      <input type="radio" id="contact-email" name="contact-method" value="email">
      <label for="contact-email">Email</label><br>
      <input type="radio" id="contact-phone" name="contact-method" value="phone">
      <label for="contact-phone">Phone</label><br>
      <input type="radio" id="contact-any" name="contact-method" value="any" checked>
      <label for="contact-any">Either</label><br><br>

      <p>Interests (check all that apply):</p>
      <input type="checkbox" id="interest-web" name="interests" value="web">
      <label for="interest-web">Web Development</label><br>
      <input type="checkbox" id="interest-design" name="interests" value="design">
      <label for="interest-design">UI/UX Design</label><br>
      <input type="checkbox" id="interest-data" name="interests" value="data">
      <label for="interest-data">Data Science</label><br>
      <input type="checkbox" id="interest-mobile" name="interests" value="mobile">
      <label for="interest-mobile">Mobile Development</label><br><br>

      <input type="checkbox" id="newsletter" name="newsletter" value="yes">
      <label for="newsletter">Subscribe to our newsletter</label><br>
    </fieldset>

    <br>

    <input type="submit" value="Send Message">
    <input type="reset" value="Reset Form">

  </form>

</body>
</html>
