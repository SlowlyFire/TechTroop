<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3 - Image Bookmarks</title>
  <link rel="stylesheet" href="exercise3.css">
</head>
<body>
  <h1>My Bookmarks</h1>
  <div class="bookmarks">
    <a href="https://www.ynet.co.il" target="_blank" rel="noopener noreferrer" class="bookmark-link" aria-label="Ynet">
      <img src="https://images.seeklogo.com/logo-png/35/1/ynet-logo-png_seeklogo-350560.png" alt="Ynet logo">
    </a>
    <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer" class="bookmark-link" aria-label="YouTube">
      <img src="https://download.logo.wine/logo/YouTube/YouTube-Logo.wine.png" alt="YouTube logo">
    </a>
    <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer" class="bookmark-link" aria-label="Facebook">
      <img src="https://img.magnific.com/premium-vector/vector-facebook-social-media-icon-illustration_534308-21672.jpg?semt=ais_hybrid&w=740&q=80" alt="Facebook logo">
    </a>
  </div>
</body>
</html>
