<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 3 – Image Gallery</title>
  <link rel="stylesheet" href="ex3.css" />
</head>
<body>
  <header>
    <h1>Photo Gallery</h1>
    <p>Click any image to view fullscreen</p>
  </header>

  <main class="gallery">

    <a class="gallery-item" href="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600" target="_blank">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800" alt="Mountain landscape" />
      <span class="caption">Mountain Peaks</span>
    </a>

    <a class="gallery-item" href="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600" target="_blank">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800" alt="Tropical beach" />
      <span class="caption">Tropical Beach</span>
    </a>

    <a class="gallery-item" href="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1600" target="_blank">
      <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800" alt="Technology workspace" />
      <span class="caption">Modern Workspace</span>
    </a>

    <a class="gallery-item" href="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1600" target="_blank">
      <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" alt="Forest path" />
      <span class="caption">Forest Path</span>
    </a>

    <a class="gallery-item" href="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1600" target="_blank">
      <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800" alt="City skyline" />
      <span class="caption">City Skyline</span>
    </a>

    <a class="gallery-item" href="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1600" target="_blank">
      <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800" alt="Coffee cup" />
      <span class="caption">Morning Coffee</span>
    </a>

  </main>
</body>
</html>
