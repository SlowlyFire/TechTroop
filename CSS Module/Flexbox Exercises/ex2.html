<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2</title>
  <link rel="stylesheet" href="ex2.css">
</head>
<body>
  <h2>4 boxes evenly distributed:</h2>
  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>

  <h2>2 boxes (2 and 3) are twice as big as the first:</h2>
  <div class="container">
    <div class="box box-small">1</div>
    <div class="box box-large">2</div>
    <div class="box box-large">3</div>
  </div>
</body>
</html>
