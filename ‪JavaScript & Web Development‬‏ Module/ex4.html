<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 4 - Sign Up Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 440px;
      width: 100%;
    }
    h1 { text-align: center; color: #333; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-weight: 600; color: #555; margin-bottom: 6px; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #5a67d8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #4c51bf; }
    .error-msg {
      color: #c53030;
      background: #fed7d7;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 6px;
      font-size: 13px;
    }
    /* Extension 1: welcome screen */
    #welcome {
      display: none;
      text-align: center;
      padding: 20px;
    }
    #welcome h2 { color: #276749; font-size: 26px; margin-bottom: 10px; }
    #welcome p  { color: #555; }
  </style>
</head>
<body>
  <div class="card">

    <div id="formSection">
      <h1>📝 Sign Up</h1>
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your full name" />
      </div>
      <div class="field">
        <label for="salary">Salary ($)</label>
        <input type="number" id="salary" placeholder="10,001 – 15,999" />
      </div>
      <div class="field">
        <label for="birthday">Birthday</label>
        <input type="date" id="birthday" />
      </div>
      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="10 digits" />
      </div>
      <button onclick="validate()">Sign Up</button>
      <div id="errors"></div>
    </div>

    <!-- Extension 1: shown after successful submission -->
    <div id="welcome">
      <h2>🎉 Welcome!</h2>
      <p id="welcomeMsg"></p>
    </div>

  </div>

  <script>
    function validate() {
      const name     = document.getElementById('name').value.trim();
      const salary   = Number(document.getElementById('salary').value);
      const birthday = document.getElementById('birthday').value;
      const phone    = document.getElementById('phone').value.trim();
      const errorsDiv = document.getElementById('errors');

      errorsDiv.innerHTML = '';   // clear previous errors
      const errors = [];

      // Validation rules
      if (name.length <= 2) {
        errors.push('Name must be longer than 2 characters.');
      }
      if (!salary || salary <= 10000 || salary >= 16000) {
        errors.push('Salary must be greater than 10,000 and less than 16,000.');
      }
      if (!birthday) {
        errors.push('Birthday may not be empty.');
      }
      const digitsOnly = phone.replace(/\D/g, '');
      if (digitsOnly.length !== 10) {
        errors.push('Phone number must be exactly 10 digits.');
      }

      if (errors.length > 0) {
        // Show each error in red
        errors.forEach(function(err) {
          const div = document.createElement('div');
          div.className = 'error-msg';
          div.textContent = err;
          errorsDiv.appendChild(div);
        });
      } else {
        // Extension 1: hide form, show welcome message
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('welcome').style.display = 'block';
        document.getElementById('welcomeMsg').textContent =
          'Thanks for signing up, ' + name + '!';
      }
    }
  </script>
</body>
</html>
