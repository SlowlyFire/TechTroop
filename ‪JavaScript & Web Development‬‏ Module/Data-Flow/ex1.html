<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Posts App</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
    input { margin: 5px; padding: 6px; width: 200px; }
    button { padding: 6px 14px; margin: 5px; cursor: pointer; }
    .post { border: 1px solid #ccc; border-radius: 4px; padding: 10px; margin: 8px 0; }
    .post strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

  <h2>Posts</h2>

  <input type="text" id="nameInput" placeholder="Your name" />
  <input type="text" id="textInput" placeholder="Your post" />
  <button id="submitBtn">Submit</button>

  <div id="postsContainer"></div>

  <script>
    // Model – initial data
    const posts = [
      { name: "Alice", text: "Hello, world!" },
      { name: "Bob",   text: "Data flow is fun." },
      { name: "Carol", text: "MVC makes sense!" }
    ];

    // View – render posts to the DOM
    function render() {
      const container = document.getElementById("postsContainer");
      container.innerHTML = "";          // ← clears old posts to prevent duplicates

      posts.forEach(function(post) {
        const div = document.createElement("div");
        div.classList.add("post");
        div.innerHTML = `<strong>${post.name}</strong>${post.text}`;
        container.appendChild(div);
      });
    }

    // Controller – handle button click
    document.getElementById("submitBtn").addEventListener("click", function() {
      const name = document.getElementById("nameInput").value.trim();
      const text = document.getElementById("textInput").value.trim();

      if (!name || !text) return;        // basic validation – don't add empty posts

      posts.push({ name, text });        // update model

      document.getElementById("nameInput").value = "";   // clear inputs
      document.getElementById("textInput").value = "";

      render();                          // re-render view
    });

    // Initial render on page load
    render();
  </script>

</body>
</html>
